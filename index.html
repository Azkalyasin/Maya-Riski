<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Wedding | Digital Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="premium.css">
</head>

<body>
    <!-- Background Audio -->
    <audio id="bg-audio" src="audio.mp4" loop preload="auto" playsinline webkit-playsinline></audio>

    <!-- Star Background Layer -->
    <div id="stars-container"></div>

    <!-- Opening Screen (background + button only) -->
    <div class="opening-screen" id="openingScreen">
        <div class="btn-open-wrapper">
            <button class="btn-open" id="openBtn">Open Invitation</button>
        </div>
    </div>

    <!-- Heart (independent, fixed at exact screen center, above everything) -->
    <div class="heart-wrapper" id="heartWrapper">
        <div class="heart-icon" id="heartIcon"></div>
    </div>

    <!-- Music Toggle Button -->
    <button class="music-btn" id="musicBtn" title="Toggle Music">
        <svg class="music-icon" id="musicIconOn" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        <svg class="music-icon hidden" id="musicIconOff" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M4.27 3L3 4.27l9 9v.28c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4v-1.73l5.73 5.73L21 19.73 4.27 3zM18 7h-4V3h-6v6.27l6 6V7h4V3z"/></svg>
    </button>

    <!-- Main Content Wrapper -->
    <main class="invitation-container">
        <!-- Slider Background -->
        <div class="slider-container" id="sliderContainer">
            <div class="slide active" style="background-image: url('bgslide1.png');">
                <img class="slide-img fade-content swing-img" src="slide1.png" alt="Slide 1">
            </div>
            <div class="slide" style="background-image: url('background.png');">
                <img class="slide-img fade-content" src="slide2.png" alt="Slide 2">
            </div>
            <div class="slide" style="background-image: url('background.png');">
                <img class="slide-img fade-content" src="slide3.png" alt="Slide 3">
            </div>
            <div class="slide" style="background-image: url('background.png');">
                <img class="slide-img fade-content" src="slide4.png" alt="Slide 4">
            </div>
            <div class="slide" style="background-image: url('background.png');">
                <img class="slide-img fade-content" src="slide5.png" alt="Slide 5">
            </div>
            <div class="slide" style="background-image: url('background.png');">
                <img class="slide-img fade-content" src="slide6.png" alt="Slide 6">
            </div>
            <div class="slide" style="background-image: url('bggaleri.png');">
                <img class="slide-img fade-content" src="galeri1.png" alt="Slide 7">
            </div>
            <div class="slide" style="background-image: url('bggaleri.png');">
                <img class="slide-img fade-content" src="galeri2.png" alt="Slide 8">
            </div>
            <div class="slide" style="background-image: url('background.png');">
                <img class="slide-img fade-content" src="slide9.png" alt="Slide 9">
            </div>
            <div class="slide gift-slide" style="background-image: url('background.png');">
                <div class="gift-section">
                    <img class="gift-img" src="slide7-top.png" alt="Wedding Gift">
                    <div class="gift-accounts">
                        <p class="account-name">Maya Laelatul Qodria / Mandiri</p>
                        <div class="account-box">
                            <span class="account-number">1234567890</span>
                            <button class="btn-copy" onclick="copyRekening('1234567890', this)">Salin</button>
                        </div>
                        
                        <p class="account-name">Risqi Hidayat / BCA</p>
                        <div class="account-box">
                            <span class="account-number">0987654321</span>
                            <button class="btn-copy" onclick="copyRekening('0987654321', this)">Salin</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="slide rsvp-slide" style="background-image: url('background.png');">
                <div class="rsvp-section">
                    <img class="gift-img" src="slide8-top.png" alt="RSVP">
                    
                    <div class="rsvp-container">
                        <!-- RSVP Stats -->
                        <div class="rsvp-stats">
                            <div class="stat-box hadir">
                                <span class="stat-num" id="count-hadir">0</span>
                                <span class="stat-label">Hadir</span>
                            </div>
                            <div class="stat-box tidak-hadir">
                                <span class="stat-num" id="count-tidak-hadir">0</span>
                                <span class="stat-label">Tidak Hadir</span>
                            </div>
                        </div>

                        <!-- RSVP Form -->
                        <form id="rsvp-form" class="rsvp-form">
                            <input type="text" id="rsvp-nama" placeholder="Nama" required>
                            <textarea id="rsvp-ucapan" placeholder="Ucapan" rows="3" required></textarea>
                            <select id="rsvp-kehadiran" required>
                                <option value="" disabled selected>Konfirmasi Kehadiran</option>
                                <option value="Hadir">Hadir</option>
                                <option value="Tidak Hadir">Tidak Hadir</option>
                            </select>
                            <button type="submit" class="btn-kirim">Kirim</button>
                        </form>

                        <!-- Comments List -->
                        <div class="comments-list" id="comments-list">
                            <!-- Comments will be injected here via JS -->
                        </div>
                    </div>
                </div>
            </div>
            <div class="slide" style="background-image: url('background.png');">
                <img class="slide-img fade-content" src="slide9.png" alt="Slide 9">
            </div>
            <div class="overlay"></div>

            <!-- Navigation Buttons -->
            <div class="slider-nav">
                <a href="https://maps.app.goo.gl/gRQbGzSaCQiBJMMU8" target="_blank" class="maps-btn" id="mapsBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                    Open Maps
                </a>
                <a href="https://www.instagram.com/creative.invitation_id" target="_blank" class="btn-creative" id="creativeBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M8 0C5.829 0 5.556.01 4.703.048 3.85.088 3.269.222 2.76.42a3.917 3.917 0 0 0-1.417.923A3.927 3.927 0 0 0 .42 2.76C.222 3.268.087 3.85.048 4.7.01 5.555 0 5.827 0 8.001c0 2.172.01 2.444.048 3.297.04.852.174 1.433.372 1.942.205.526.478.972.923 1.417.444.445.89.719 1.416.923.51.198 1.09.333 1.942.372C5.555 15.99 5.827 16 8 16s2.444-.01 3.298-.048c.851-.04 1.434-.174 1.943-.372a3.916 3.916 0 0 0 1.416-.923c.445-.445.718-.891.923-1.417.197-.509.332-1.09.372-1.942C15.99 10.445 16 10.173 16 8s-.01-2.445-.048-3.299c-.04-.851-.175-1.433-.372-1.941a3.926 3.926 0 0 0-.923-1.417A3.911 3.911 0 0 0 13.24.42c-.51-.198-1.092-.333-1.943-.372C10.443.01 10.172 0 7.998 0h.003zm-.717 1.442h.718c2.136 0 2.389.007 3.232.046.78.035 1.204.166 1.486.275.373.145.64.319.92.599.28.28.453.546.598.92.11.281.24.705.275 1.485.039.843.047 1.096.047 3.231s-.008 2.389-.047 3.232c-.035.78-.166 1.203-.275 1.485a2.47 2.47 0 0 1-.599.919c-.28.28-.546.453-.92.598-.28.11-.704.24-1.485.276-.843.038-1.096.047-3.232.047s-2.39-.009-3.233-.047c-.78-.036-1.203-.166-1.485-.276a2.478 2.478 0 0 1-.92-.598 2.48 2.48 0 0 1-.6-.92c-.109-.281-.24-.705-.275-1.485-.038-.843-.046-1.096-.046-3.233 0-2.136.008-2.388.046-3.231.036-.78.166-1.204.276-1.486.145-.373.319-.64.599-.92.28-.28.546-.453.92-.598.282-.11.705-.24 1.485-.276.738-.034 1.024-.044 2.515-.045v.002zm4.988 1.328a.96.96 0 1 0 0 1.92.96.96 0 0 0 0-1.92zm-4.27 1.122a4.109 4.109 0 1 0 0 8.217 4.109 4.109 0 0 0 0-8.217zm0 1.441a2.667 2.667 0 1 1 0 5.334 2.667 2.667 0 0 1 0-5.334z"/>
                    </svg>
                    <span>creative.invitation_id</span>
                </a>
                <div class="nav-arrows">
                    <button id="prevBtn" class="nav-btn" aria-label="Previous Slide">&#8592;</button>
                    <button id="nextBtn" class="nav-btn" aria-label="Next Slide">&#8594;</button>
                </div>
            </div>
        </div>

        <!-- Konten dihapus agar hanya menampilkan slider dan bintang -->
    </main>

    <script src="premium.js"></script>
</body>

</html>
